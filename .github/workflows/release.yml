name: Create release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate, package, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the selected release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.1
          sudo ln -sf "$(command -v lua5.1)" /usr/local/bin/lua

      - name: Select the next release version
        id: release_metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/heads/* ]]; then
            echo "Create release must be run from a branch, not '$GITHUB_REF'." >&2
            exit 1
          fi
          BASE_VERSION="$(python3 -c 'import json; print(json.load(open("tools/release.json", encoding="utf-8"))["version"])')"
          RELEASE_VERSION="$(git ls-remote --tags --refs origin | python3 tools/next_release_version.py --base-version "$BASE_VERSION")"
          RELEASE_CHANNEL="$(python3 -c 'import json; print(json.load(open("tools/release.json", encoding="utf-8")).get("release_channel", "stable"))')"
          case "$RELEASE_CHANNEL" in
            alpha|stable) ;;
            *)
              echo "tools/release.json has unsupported release_channel '$RELEASE_CHANNEL'." >&2
              exit 1
              ;;
          esac
          RELEASE_TAG="v$RELEASE_VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "The selected tag $RELEASE_TAG already exists; retry the workflow to select a newer patch." >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "A GitHub release already exists for $RELEASE_TAG." >&2
            exit 1
          fi
          python3 - "$RELEASE_VERSION" <<'PY'
          import json
          import sys
          from pathlib import Path

          manifest_path = Path("tools/release.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["version"] = sys.argv[1]
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
          printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION" >> "$GITHUB_ENV"
          printf 'RELEASE_TAG=%s\n' "$RELEASE_TAG" >> "$GITHUB_ENV"
          printf 'RELEASE_CHANNEL=%s\n' "$RELEASE_CHANNEL" >> "$GITHUB_ENV"
          printf 'release_version=%s\n' "$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          printf 'release_tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          printf 'release_channel=%s\n' "$RELEASE_CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Run automated tests
        run: |
          set -euo pipefail
          for test in tools/tests/lua/*.lua; do
            lua5.1 "$test" "$GITHUB_WORKSPACE"
          done
          python3 -m unittest discover -s tools/tests -v

      - name: Run release gates
        run: |
          set -euo pipefail
          python3 tools/validate_addons.py --strict
          if [[ "$RELEASE_CHANNEL" == "stable" ]]; then
            python3 tools/check_release_parity.py
          else
            python3 tools/check_release_parity.py --allow-live-pending
          fi

      - name: Create deterministic release archive
        run: python3 tools/package_release.py

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: ZygorGuidesViewer-WotLK-${{ steps.release_metadata.outputs.release_tag }}
          if-no-files-found: error
          path: |
            tools/dist/*.zip
            tools/dist/*.zip.sha256

      - name: Create and push release tag
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "The tag $RELEASE_TAG was created while this workflow was running." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/release.json
          if ! git diff --cached --quiet; then
            git commit --message "chore(release): $RELEASE_TAG"
            git push origin "HEAD:$GITHUB_REF"
          fi
          RELEASE_COMMIT="$(git rev-parse HEAD)"
          git tag --annotate "$RELEASE_TAG" --message "ZygorPlus ${RELEASE_TAG#v} (${RELEASE_CHANNEL})" "$RELEASE_COMMIT"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_CHANNEL" == "alpha" ]]; then
            gh release create "$RELEASE_TAG" tools/dist/*.zip tools/dist/*.zip.sha256 \
              --title "ZygorPlus ${RELEASE_TAG#v} (Alpha)" \
              --prerelease \
              --notes $'## Alpha release\n\nThis early build is published for real-client testing and feedback. Some live-client acceptance scenarios remain pending; see `tools/release_acceptance.md` in the tagged source. Please report reproducible issues with your client build, enabled addons, guide, and diagnostic report.' \
              --generate-notes
          else
            gh release create "$RELEASE_TAG" tools/dist/*.zip tools/dist/*.zip.sha256 \
              --title "ZygorPlus ${RELEASE_TAG#v}" \
              --generate-notes
          fi
