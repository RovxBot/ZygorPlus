name: Create release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.1.13
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate, package, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.1
          sudo ln -sf "$(command -v lua5.1)" /usr/local/bin/lua

      - name: Verify release tag and version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}" >/dev/null
          VERSION="$(python3 -c 'import json; print(json.load(open("tools/release.json", encoding="utf-8"))["version"])')"
          [[ "$RELEASE_TAG" == "v$VERSION" ]]
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "A GitHub release already exists for $RELEASE_TAG." >&2
            exit 1
          fi

      - name: Run automated tests
        run: |
          set -euo pipefail
          for test in tools/tests/lua/*.lua; do
            lua5.1 "$test" "$GITHUB_WORKSPACE"
          done
          python3 -m unittest discover -s tools/tests -v

      - name: Run strict release gates
        run: |
          set -euo pipefail
          python3 tools/validate_addons.py --strict
          python3 tools/check_release_parity.py

      - name: Create deterministic release archive
        run: python3 tools/package_release.py

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: ZygorGuidesViewer-WotLK-${{ inputs.tag }}
          if-no-files-found: error
          path: |
            tools/dist/*.zip
            tools/dist/*.zip.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" tools/dist/*.zip tools/dist/*.zip.sha256 \
            --title "ZygorPlus ${RELEASE_TAG#v}" \
            --generate-notes
